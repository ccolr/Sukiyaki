name: Build Surge Rules

on:
  schedule:
    - cron: "0 22 * * *"
  push:
    paths:
      - "Rule/**.conf"
      - "Tool/classify_batch.txt"
      - "Tool/surge_classify.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sukiyaki
        uses: actions/checkout@v4
        with:
          path: Sukiyaki

      - name: Checkout Rule
        uses: actions/checkout@v4
        with:
          repository: ccolr/Rule
          token: ${{ secrets.RULE_REPO_TOKEN }}
          path: Rule

      - name: 构建规则集
        working-directory: Sukiyaki
        run: |
          python3 Tool/surge_classify.py \
            -b Tool/classify_batch.txt \
            -o ../Rule

      - name: 推送到 Rule 仓库
        run: |
          cd Rule
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Surge/
          git diff --cached --quiet && echo "无变更, 跳过推送" && exit 0
          git commit -m "Auto-build: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
          git push

      - name: 触发 Vercel 重新部署
        if: success()
        run: curl -X POST "${{ secrets.RULE_DEPLOY_HOOK }}"
