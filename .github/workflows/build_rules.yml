name: Build Surge Rules

on:
  schedule:
    - cron: "0 22 * * *"
  push:
    paths:
      - "MyRule/**.conf"
      - "Tool/classify_batch.txt"
      - "Tool/batch.txt"
      - "Tool/surge_classify.py"
      - "Tool/surge_merge.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sukiyaki
        uses: actions/checkout@v4
        with:
          path: Sukiyaki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Rule
        uses: actions/checkout@v4
        with:
          repository: ccolr/Rule
          token: ${{ secrets.RULE_REPO_TOKEN }}
          path: Rule

      - name: 合并规则到本仓库 Rule/
        working-directory: Sukiyaki
        run: |
          python3 Tool/surge_merge.py \
            -b Tool/batch.txt \
            -o ./Rule

      - name: 提交本仓库 Rule/ 变更
        working-directory: Sukiyaki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Rule/
          if git diff --cached --quiet; then
            echo "Rule/ 无变更, 跳过提交"
          else
            git commit -m "Auto-merge: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
            git push
          fi

      - name: 构建规则集到外部 Rule 仓库
        working-directory: Sukiyaki
        run: |
          python3 Tool/surge_classify.py \
            -b Tool/classify_batch.txt \
            -o ../Rule

      - name: 推送到 Rule 仓库
        run: |
          cd Rule
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Surge/
          git diff --cached --quiet && echo "无变更, 跳过推送" && exit 0
          git commit -m "Auto-build: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event_name }}]"
          git push

      - name: 触发 Vercel 重新部署
        if: success()
        run: curl -X POST "${{ secrets.RULE_DEPLOY_HOOK }}"
